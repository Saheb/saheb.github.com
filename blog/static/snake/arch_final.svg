<svg width="680" viewBox="0 0 680 612" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
<title>Cross-size Snake agent architecture</title>
<desc>Egocentric 5-channel input (body, head, food, head-relative row/col) -> conv trunk -> attention pool (background-suppressing) plus global max-pool -> dueling head -> argmax. Trained on a curriculum of board sizes 6-22; plays 100x100 zero-shot.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
  .t{font-size:14px}.ts{font-size:12px}.th{font-size:14px;font-weight:500}
  .box{fill:#f9fafb;stroke:#6b7280;stroke-width:1.2}
  .green{fill:#DCFCE7;stroke:#16A34A;stroke-width:1.2}.green-t{fill:#14532D}
  .amber{fill:#FEF3C7;stroke:#D97706;stroke-width:1.2}.amber-t{fill:#92400E}
  .blue{fill:#E6F1FB;stroke:#2563EB;stroke-width:1.2}.blue-t{fill:#0C447C}
  .arr{stroke:#6b7280;stroke-width:1.5;fill:none}.gray-t{fill:#374151}.n-t{fill:#111827}
</style>

<rect class="green" x="140" y="44" width="400" height="66" rx="8"/>
<text class="th green-t" x="340" y="66" text-anchor="middle">Input &#8212; 5 channels</text>
<text class="ts green-t" x="340" y="83" text-anchor="middle">body &#183; head &#183; food &#183; egocentric (row, col)</text>
<text class="ts green-t" x="340" y="100" text-anchor="middle">head-relative offsets, squashed &#8594; size-invariant</text>
<line class="arr" x1="340" y1="110" x2="340" y2="140" marker-end="url(#arrow)"/>

<rect class="box" x="160" y="140" width="360" height="54" rx="8"/>
<text class="th n-t" x="340" y="162" text-anchor="middle">Conv trunk</text>
<text class="ts gray-t" x="340" y="180" text-anchor="middle">5&#8594;64&#8594;128, 3&#215;3, ReLU &#8594; 128 &#215; H &#215; W</text>
<line class="arr" x1="340" y1="194" x2="340" y2="224" marker-end="url(#arrow)"/>

<rect class="amber" x="150" y="224" width="380" height="66" rx="8"/>
<text class="th amber-t" x="340" y="246" text-anchor="middle">Attention pool &#8214; max-pool &#8594; 256</text>
<text class="ts amber-t" x="340" y="263" text-anchor="middle">softmax over cells &#8594; suppresses empty background</text>
<text class="ts amber-t" x="340" y="280" text-anchor="middle">area-invariant: 100&#215;100 looks like training</text>
<line class="arr" x1="340" y1="290" x2="185" y2="336" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="290" x2="505" y2="336" marker-end="url(#arrow)"/>

<rect class="blue" x="60" y="338" width="230" height="56" rx="8"/>
<text class="th blue-t" x="175" y="361" text-anchor="middle">Value stream</text>
<text class="ts blue-t" x="175" y="379" text-anchor="middle">Linear&#8594;ReLU&#8594;Linear &#8594; V (1)</text>

<rect class="blue" x="390" y="338" width="230" height="56" rx="8"/>
<text class="th blue-t" x="505" y="361" text-anchor="middle">Advantage stream</text>
<text class="ts blue-t" x="505" y="379" text-anchor="middle">Linear&#8594;ReLU&#8594;Linear &#8594; A (4)</text>

<line class="arr" x1="175" y1="394" x2="255" y2="440" marker-end="url(#arrow)"/>
<line class="arr" x1="505" y1="394" x2="425" y2="440" marker-end="url(#arrow)"/>

<rect class="blue" x="200" y="440" width="280" height="52" rx="8"/>
<text class="th blue-t" x="340" y="462" text-anchor="middle">Dueling combine</text>
<text class="ts blue-t" x="340" y="480" text-anchor="middle">Q = V + (A &#8722; mean A)</text>
<line class="arr" x1="340" y1="492" x2="340" y2="520" marker-end="url(#arrow)"/>

<rect class="box" x="250" y="520" width="180" height="40" rx="8"/>
<text class="th n-t" x="340" y="545" text-anchor="middle">argmax &#8594; action</text>

<rect class="green" x="120" y="584" width="15" height="15" rx="3"/>
<text class="ts gray-t" x="142" y="596" text-anchor="start">size-invariant representation (egocentric)</text>
<rect class="amber" x="420" y="584" width="15" height="15" rx="3"/>
<text class="ts gray-t" x="442" y="596" text-anchor="start">background-suppressing pool</text>
</svg>
