baseURL = 'https://saheb.github.io/blog/'
languageCode = 'en-us'
title = "Saheb's AI Journey"
publishDir = '../_site/blog'
theme = 'hugo-paper'
relativeURLs = true
canonifyURLs = true

[params]
  color = 'blue'
  monoDarkIcon = true
  mainSections = ['posts']

[[menu.main]]
  name = 'Posts'
  pageRef = '/posts'
  weight = 1

[[menu.main]]
  name = 'Notes'
  pageRef = '/notes'
  weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true
