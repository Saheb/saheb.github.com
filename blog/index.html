<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saheb's Blog</title>
    <link rel="icon" type="image/png" href="/saheb-circle.png">
    <link rel="stylesheet" type="text/css" href="/style.css">
    <style>
        .blog-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 80vh;
            padding-top: 50px;
            padding-bottom: 50px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .blog-container {
            max-width: 600px;
            text-align: left;
            width: 100%;
        }
        .blog-post-item {
            margin-bottom: 30px;
        }
        .blog-post-title {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            text-decoration: none;
            line-height: 1.3;
            display: inline-block;
            margin-bottom: 5px;
        }
        .blog-post-title:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container blog-list">
        <div class="blog-container">
            <h1 style="margin-top: 0; margin-bottom: 30px;">Blog</h1>
            
            {% for p in site.pages %}
                {% if p.path contains 'blog/' and p.name != 'index.html' %}
                <div class="blog-post-item">
                    <a href="{{ p.url }}" class="blog-post-title">{{ p.title }}</a>
                </div>
                {% endif %}
            {% endfor %}

        </div>
    </div>
</body>
</html>
