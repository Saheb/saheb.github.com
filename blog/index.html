<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saheb's AI Blog</title>
    <link rel="icon" type="image/png" href="/saheb-circle.png">
    <link rel="stylesheet" type="text/css" href="/style.css">
    <style>
        .blog-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 80vh;
            padding-top: 50px;
            padding-bottom: 50px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .blog-container {
            max-width: 600px;
            text-align: left;
            width: 100%;
        }

        .blog-post-item {
            margin-bottom: 30px;
        }

        .blog-post-title {
            font-size: 20px;
            font-weight: 500;
            color: #007bff;
            text-decoration: none;
            line-height: 1.4;
            display: inline-block;
            margin-bottom: 2px;
        }

        .blog-post-title:hover {
            text-decoration: underline;
        }

        .blog-post-date {
            font-size: 14px;
            color: #666;
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div class="container blog-list">
        <div class="blog-container">
            <h1 style="margin-top: 0; margin-bottom: 30px;">AI Journey</h1>

            {% for p in site.pages %}
            {% if p.path contains 'blog/' and p.name != 'index.html' %}
            <div class="blog-post-item">
                <a href="{{ p.url }}" class="blog-post-title">{{ p.title }}</a>
                {% if p.date %}
                <div class="blog-post-date">{{ p.date | date: "%B %-d, %Y" }}</div>
                {% endif %}
            </div>
            {% endif %}
            {% endfor %}

        </div>
    </div>
</body>

</html>
