name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build deploy directory
        run: |
          mkdir -p deploy
          # Copy all static files from root (excluding git, hugo, and deploy itself)
          for f in *; do
            case "$f" in
              .git|blog|deploy|_site|.github) continue ;;
            esac
            cp -r "$f" "deploy/$f"
          done
          # Build Hugo blog into deploy/blog/
          cd blog
          hugo --destination ../deploy/blog
          cd ..
          # Disable Jekyll processing on GitHub Pages
          touch deploy/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
